services:
  zeta-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zeta-backend
    user: "${ZETA_DOCKER_UID:-1000}:${ZETA_DOCKER_GID:-1000}"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - ZETA_BOTLIVE_ONLY=false
    ports:
      - "0.0.0.0:8002:8002"
    volumes:
      - ${ZETA_MODELS_PATH:-./models}:/app/models
      - ${ZETA_CHECKPOINTS_PATH:-./checkpoints}:/app/checkpoints
      - ./data/catalogs:/data/catalogs
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8002/ingestion/health"]
      interval: 30s
      timeout: 5s
      retries: 3
