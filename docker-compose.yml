services:
  redis:
    image: redis:7-alpine
    container_name: zeta-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./data/redis:/data

  zeta-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zeta-backend
    user: "${ZETA_DOCKER_UID:-1000}:${ZETA_DOCKER_GID:-1000}"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - ZETA_BOTLIVE_ONLY=false
      - REDIS_URL=redis://redis:6379/0
      - HOME=/data
      - XDG_CACHE_HOME=/data/cache
      - HF_HOME=/data/cache/huggingface
      - TRANSFORMERS_CACHE=/data/cache/huggingface
      - HUGGINGFACE_HUB_CACHE=/data/cache/huggingface
      - EASYOCR_HOME=/data/easyocr
    depends_on:
      - redis
    ports:
      - "0.0.0.0:8002:8002"
    volumes:
      - ${ZETA_MODELS_PATH:-./models}:/app/models
      - ${ZETA_CHECKPOINTS_PATH:-./checkpoints}:/app/checkpoints
      - ./data/catalogs:/data/catalogs
      - ./data/state:/data/state
      - ./data/cache:/data/cache
      - ./data/easyocr:/data/easyocr
      - ./data/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8002/ingestion/health"]
      interval: 30s
      timeout: 5s
      retries: 3
